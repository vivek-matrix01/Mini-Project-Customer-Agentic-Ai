version: '3.8'

services:
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./Backend/project
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Connects to the host machine's PostgreSQL instance. 
      # host.docker.internal works on Docker Desktop (Windows/Mac).
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/MiniProject
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=megha
      # The backend needs to know where the AI service is.
      # Within the docker-compose network, we use the service name 'ai-service'.
      - AI_SERVICE_URL=http://ai-service:8000/analyze
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ai-service

  ai-service:
    build:
      context: ./AiCustomerAssitant
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Connects to the host machine's Ollama instance.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
